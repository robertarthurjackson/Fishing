<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Spots — Fairmont & Calgary</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --border: #d9dee3;
    --text: #1c2733;
    --muted: #64748b;
    --accent: #0e7490;
    --accent-soft: #e0f2f7;
    --danger: #b91c1c;
    --chip: #eef2f5;
    --shadow: 0 2px 10px rgba(15, 30, 45, 0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #10161c;
      --panel: #1a232c;
      --border: #2d3a46;
      --text: #e6edf3;
      --muted: #94a3b8;
      --accent: #22b8d4;
      --accent-soft: #123a44;
      --danger: #f87171;
      --chip: #263340;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 340px;
    min-width: 340px;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-right: 1px solid var(--border);
    z-index: 1000;
  }
  #sidebar header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar h1 {
    margin: 0 0 2px;
    font-size: 17px;
    letter-spacing: 0.2px;
  }
  #sidebar h1 span { color: var(--accent); }
  .subtitle { font-size: 12px; color: var(--muted); }

  .toolbar {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  button {
    font: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { filter: brightness(1.1); }
  button.danger { color: var(--danger); }
  button.small { font-size: 12px; padding: 4px 8px; }

  .filters {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filters .row { display: flex; gap: 6px; }
  input[type="text"], input[type="search"], select, textarea {
    font: inherit;
    font-size: 13px;
    width: 100%;
    padding: 6px 8px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
  }
  textarea { resize: vertical; min-height: 52px; }

  #spot-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .spot-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    background: var(--panel);
  }
  .spot-card:hover { border-color: var(--accent); }
  .spot-card.active { border-color: var(--accent); background: var(--accent-soft); }
  .spot-card .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .spot-card .name { font-weight: 600; font-size: 14px; }
  .spot-card .detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .score-badge {
    min-width: 34px;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    padding: 2px 7px;
    border-radius: 999px;
    color: #fff;
    flex-shrink: 0;
  }
  .chips { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    font-size: 11px;
    background: var(--chip);
    color: var(--text);
    padding: 2px 7px;
    border-radius: 999px;
  }
  .chip.region { color: var(--accent); font-weight: 600; }
  .empty-note {
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  /* ---------- Map ---------- */
  #map { flex: 1; height: 100%; }
  .region-jump {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001;
    display: flex;
    gap: 6px;
    background: var(--panel);
    padding: 5px;
    border-radius: 10px;
    box-shadow: var(--shadow);
  }
  #draw-banner {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001;
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    max-width: 90%;
  }
  #draw-banner.visible { display: flex; }

  /* ---------- Editor panel ---------- */
  #editor {
    position: absolute;
    top: 0;
    right: 0;
    width: 360px;
    max-width: 92vw;
    height: 100%;
    background: var(--panel);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow);
    z-index: 1002;
    display: none;
    flex-direction: column;
  }
  #editor.visible { display: flex; }
  #editor .head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  #editor .head h2 { margin: 0; font-size: 15px; }
  #editor .body { flex: 1; overflow-y: auto; padding: 14px 16px; }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field .hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .rating-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 10px;
  }
  .rating-row .rname { font-size: 13px; width: 92px; flex-shrink: 0; }
  .stars { display: flex; gap: 2px; }
  .stars button {
    border: none;
    background: none;
    font-size: 20px;
    padding: 0 2px;
    cursor: pointer;
    color: var(--border);
    line-height: 1;
  }
  .stars button.on { color: #f59e0b; }
  .stars button.clear { font-size: 12px; color: var(--muted); align-self: center; margin-left: 4px; }
  #editor .foot {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: space-between;
  }
  .overall-preview {
    font-size: 13px;
    color: var(--muted);
    margin: 4px 0 12px;
  }
  .overall-preview b { color: var(--text); font-size: 15px; }

  /* ---------- Leaflet popup theming ---------- */
  /* Popups must sit above the zoom control (z 1000) and the region-jump bar (z 1001) */
  .leaflet-pane.leaflet-popup-pane { z-index: 1100; }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--panel);
    color: var(--text);
  }
  .leaflet-popup-content { margin: 12px 14px; font-size: 13px; }
  .popup-name { font-weight: 700; font-size: 14px; }
  .popup-detail { color: var(--muted); font-size: 12px; margin: 2px 0 6px; }
  .popup-section { margin-top: 6px; font-size: 12px; }
  .popup-section b { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
  .popup-actions { margin-top: 8px; display: flex; gap: 6px; }

  .pin-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 50% 50% 50% 4px;
    transform: rotate(-45deg);
    border: 2px solid #fff;
    box-shadow: 0 1px 5px rgba(0,0,0,0.4);
  }
  .pin-icon.classified { border-color: #8b5cf6; box-shadow: 0 1px 5px rgba(0,0,0,0.4), 0 0 0 2px #8b5cf6; }
  .chip.classified { color: #8b5cf6; font-weight: 600; }
  .cw-badge {
    display: inline-block;
    margin: 3px 0 2px;
    padding: 2px 7px;
    border-radius: 999px;
    background: #8b5cf6;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .checkbox-row input { margin-top: 2px; accent-color: #8b5cf6; }
  .map-legend {
    background: var(--panel);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    font-size: 11px;
    line-height: 1.7;
  }
  .map-legend .sw {
    display: inline-block;
    width: 18px;
    height: 5px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .map-legend .sw.dashed {
    background: repeating-linear-gradient(90deg, #8b5cf6 0 5px, transparent 5px 8px);
  }
  .pin-icon span {
    transform: rotate(45deg);
    color: #fff;
    font-weight: 700;
    font-size: 11px;
  }
  @media (prefers-color-scheme: dark) {
    .leaflet-layer.dimmable { filter: brightness(0.85) contrast(1.05); }
  }
</style>
</head>
<body>

<div id="sidebar">
  <header>
    <h1>🎣 Fishing Spots <span>· Fairmont & Calgary</span></h1>
    <div class="subtitle">Pins for spots · lines for stretches · areas for zones</div>
  </header>

  <div class="toolbar">
    <button class="primary" id="btn-add-pin" title="Click the map once to place a pin">+ Pin</button>
    <button class="primary" id="btn-add-line" title="Click along a stretch of river/shore, double-click to finish">+ Stretch</button>
    <button class="primary" id="btn-add-area" title="Click around a zone, double-click to finish">+ Area</button>
    <button id="btn-export" title="Download all spots as a JSON backup">Export</button>
    <button id="btn-import" title="Load spots from a JSON backup">Import</button>
    <input type="file" id="import-file" accept=".json,application/json" style="display:none">
  </div>

  <div class="filters">
    <input type="search" id="filter-search" placeholder="Search name, water, species, notes…">
    <div class="row">
      <select id="filter-region">
        <option value="">All regions</option>
        <option value="fairmont">Fairmont / Columbia Valley</option>
        <option value="south">Cranbrook / Elk Valley</option>
        <option value="calgary">Calgary area</option>
        <option value="other">Other</option>
      </select>
      <select id="sort-by">
        <option value="overall">Sort: Overall score</option>
        <option value="fish">Sort: Fish quality</option>
        <option value="action">Sort: Action</option>
        <option value="access">Sort: Ease of access</option>
        <option value="scenery">Sort: Scenery</option>
        <option value="name">Sort: Name</option>
        <option value="newest">Sort: Newest</option>
      </select>
    </div>
  </div>

  <div id="spot-list"></div>
</div>

<div id="map"></div>

<div class="region-jump">
  <button id="jump-fairmont">Fairmont BC</button>
  <button id="jump-south">Cranbrook</button>
  <button id="jump-calgary">Calgary</button>
  <button id="jump-all">Fit all</button>
</div>

<div id="draw-banner">
  <span id="draw-banner-text"></span>
  <button class="small" id="draw-finish">Finish</button>
  <button class="small" id="draw-cancel">Cancel</button>
</div>

<div id="editor">
  <div class="head">
    <h2 id="editor-title">New Spot</h2>
    <button class="small" id="editor-close">✕</button>
  </div>
  <div class="body">
    <div class="field">
      <label for="f-name">Spot name</label>
      <input type="text" id="f-name" placeholder="e.g. Columbia Lake outlet">
    </div>
    <div class="field">
      <label for="f-detail">Specific location</label>
      <input type="text" id="f-detail" placeholder="e.g. Outlet between the lake and Fairmont bridge">
      <div class="hint">The precise flag — the exact stretch, corner, or structure, not just the waterbody.</div>
    </div>
    <div class="field">
      <label for="f-water">Waterbody</label>
      <input type="text" id="f-water" placeholder="e.g. Columbia Lake / Columbia River">
    </div>
    <div class="field">
      <label for="f-region">Region</label>
      <select id="f-region">
        <option value="fairmont">Fairmont / Columbia Valley</option>
        <option value="south">Cranbrook / Elk Valley</option>
        <option value="calgary">Calgary area</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field">
      <label class="checkbox-row"><input type="checkbox" id="f-classified">
        <span>Classified water — BC special-licence stream (drawn purple &amp; dashed on the map)</span></label>
    </div>
    <div class="field">
      <label for="f-species">Species (comma-separated)</label>
      <input type="text" id="f-species" placeholder="e.g. rainbow trout, kokanee, whitefish">
    </div>
    <div class="field">
      <label for="f-season">Best season / timing</label>
      <input type="text" id="f-season" placeholder="e.g. May–June evenings; ice-off">
    </div>
    <div class="field">
      <label for="f-access">Access & regulations</label>
      <textarea id="f-access" placeholder="Parking, walk-in, boat launch… plus reg reminders: bait bans, closures, single barbless."></textarea>
    </div>
    <div class="field">
      <label for="f-notes">Notes</label>
      <textarea id="f-notes" placeholder="Flies/lures that worked, structure, hazards, anything else."></textarea>
    </div>

    <div class="field">
      <label>Ratings</label>
      <div id="rating-rows"></div>
      <div class="overall-preview">Overall: <b id="overall-preview">—</b> <span id="overall-note"></span></div>
    </div>

    <div class="field">
      <label>Location on map</label>
      <button class="small" id="btn-redraw">Redraw geometry</button>
      <div class="hint" id="geom-summary"></div>
    </div>
  </div>
  <div class="foot">
    <button class="danger" id="btn-delete">Delete</button>
    <div style="display:flex; gap:8px;">
      <button id="btn-cancel-edit">Cancel</button>
      <button class="primary" id="btn-save">Save spot</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    season: 'Boating allowed May 1–Oct 31 only; pike best May–June and Sept in the Weaselhead delta weed edges',
    access: 'Launch canoes/kayaks/rowboats at the Glenmore boat launch by the Calgary Canoe Club (24 St & 90 Ave SW). NON-MOTORIZED ONLY, and note: stand-up paddleboards and inflatables are PROHIBITED (drinking-water reservoir rules) — this is the one Calgary water where the SUP stays home. Shore fishing OK from South Glenmore Park and the Weaselhead, but not from docks or ramps.',
    notes: 'The change-of-pace option: throw big streamers or spoons along the Weaselhead weed lines for pike in the 5–10 lb class without leaving the city. Sailboat traffic mid-day; go early. Seeded ratings are reputation-based.',
    ratings: { fish: 3, action: 3, access: 4, scenery: 3 },
    createdAt: 1784678400000,
  },
];

const SEEDS_SEEN_KEY = 'fishing-seeds-seen-v1';

let spots = loadSpots();
mergeSeedSpots();

function mergeSeedSpots() {
  let seen = [];
  try { seen = JSON.parse(localStorage.getItem(SEEDS_SEEN_KEY)) || []; } catch (e) {}
  const seenSet = new Set(seen);
  const byId = new Map(spots.map(s => [s.id, s]));
  let changed = false;
  for (const seed of SEED_SPOTS) {
    const existing = byId.get(seed.id);
    if (!existing) {
      if (seenSet.has(seed.id)) continue; // user deleted it previously — don't resurrect
      spots.push(JSON.parse(JSON.stringify(seed)));
      changed = true;
      continue;
    }
    // Already on the map: refresh researched content (name/detail/access/notes/etc.)
    // as it improves, but never touch ratings — those are yours once you've fished it.
    const { ratings, id, ...content } = seed;
    if (JSON.stringify({ ...existing, ratings: undefined }) !== JSON.stringify({ ...existing, ...content, ratings: undefined })) {
      Object.assign(existing, content);
      changed = true;
    }
  }
  localStorage.setItem(SEEDS_SEEN_KEY, JSON.stringify(SEED_SPOTS.map(s => s.id)));
  if (changed) saveSpots();
}

function loadSpots() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.error('Failed to load spots', e); }
  return SAMPLE_SPOTS.map(s => ({ ...s, ratings: { ...s.ratings }, geometry: { ...s.geometry } }));
}

function saveSpots() {
  localStorage.setItem(STORE_KEY, JSON.stringify(spots));
}

function overallScore(spot) {
  const vals = CRITERIA.map(c => spot.ratings[c.key]).filter(v => v > 0);
  if (!vals.length) return null;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

function scoreColor(score) {
  if (score == null) return '#7c8a99';
  if (score >= 4.5) return '#15803d';
  if (score >= 3.5) return '#65a30d';
  if (score >= 2.5) return '#d97706';
  if (score >= 1.5) return '#ea580c';
  return '#b91c1c';
}

// Classified waters (BC special-licence streams) get their own look so they
// stand out from the rating colours: purple + dashed.
const CLASSIFIED_COLOR = '#8b5cf6';

function fmtScore(score) {
  return score == null ? '—' : (Math.round(score * 10) / 10).toFixed(1);
}

/* ================= Map ================= */

const map = L.map('map', { doubleClickZoom: false }).setView([50.7, -114.9], 8);

const baseOSM = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  className: 'dimmable',
  attribution: '&copy; OpenStreetMap contributors',
});
const baseTopo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  className: 'dimmable',
  attribution: '&copy; OpenStreetMap contributors, SRTM | © OpenTopoMap (CC-BY-SA)',
});
const baseSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Imagery © Esri',
});
baseOSM.addTo(map);
L.control.layers({ 'Street': baseOSM, 'Topo': baseTopo, 'Satellite': baseSat }, null, { position: 'topright' }).addTo(map);
L.control.scale({ imperial: false }).addTo(map);

const legendControl = L.control({ position: 'bottomleft' });
legendControl.onAdd = () => {
  const div = L.DomUtil.create('div', 'map-legend');
  div.innerHTML =
    `<b>Colour = your overall rating</b><br>` +
    `<span class="sw" style="background:#15803d"></span>4.5–5` +
    ` <span class="sw" style="background:#65a30d"></span>3.5+` +
    ` <span class="sw" style="background:#d97706"></span>2.5+` +
    ` <span class="sw" style="background:#ea580c"></span>1.5+` +
    ` <span class="sw" style="background:#b91c1c"></span>&lt;1.5` +
    ` <span class="sw" style="background:#7c8a99"></span>unrated<br>` +
    `<span class="sw dashed"></span>Classified water (special licence)`;
  return div;
};
legendControl.addTo(map);

const spotLayerGroup = L.layerGroup().addTo(map);
const layersBySpot = new Map();

function pinIcon(spot) {
  const score = overallScore(spot);
  return L.divIcon({
    className: '',
    html: `<div class="pin-icon${spot.classified ? ' classified' : ''}" style="background:${scoreColor(score)}"><span>${fmtScore(score)}</span></div>`,
    iconSize: [30, 30],
    iconAnchor: [4, 28],
    popupAnchor: [10, -26],
  });
}

function buildLayer(spot) {
  const g = spot.geometry;
  const score = overallScore(spot);
  const color = scoreColor(score);
  let layer;
  if (g.type === 'marker') {
    layer = L.marker(g.coords[0], { icon: pinIcon(spot) });
  } else if (g.type === 'line') {
    layer = spot.classified
      ? L.polyline(g.coords, { color: CLASSIFIED_COLOR, weight: 5, opacity: 0.9, dashArray: '9 7' })
      : L.polyline(g.coords, { color, weight: 5, opacity: 0.9 });
  } else {
    layer = spot.classified
      ? L.polygon(g.coords, { color: CLASSIFIED_COLOR, weight: 3, fillOpacity: 0.25, dashArray: '9 7' })
      : L.polygon(g.coords, { color, weight: 3, fillOpacity: 0.25 });
  }
  layer.bindPopup(() => popupHtml(spot), {
    maxWidth: 280,
    autoPanPaddingTopLeft: L.point(70, 64),
    autoPanPaddingBottomRight: L.point(40, 40),
  });
  layer.on('click', () => setActiveCard(spot.id));
  return layer;
}

function popupHtml(spot) {
  const score = overallScore(spot);
  const esc = escapeHtml;
  let html = `<div class="popup-name">${esc(spot.name)} ` +
    `<span class="score-badge" style="background:${scoreColor(score)}">${fmtScore(score)}</span></div>`;
  if (spot.classified) html += `<div class="cw-badge">CLASSIFIED WATER — extra licence for non-BC residents</div>`;
  if (spot.detail) html += `<div class="popup-detail">📍 ${esc(spot.detail)}</div>`;
  if (spot.waterbody) html += `<div class="popup-section"><b>Water</b><br>${esc(spot.waterbody)}</div>`;
  if (spot.species && spot.species.length) html += `<div class="popup-section"><b>Species</b><br>${esc(spot.species.join(', '))}</div>`;
  if (spot.season) html += `<div class="popup-section"><b>Season</b><br>${esc(spot.season)}</div>`;
  if (spot.access) html += `<div class="popup-section"><b>Access & regs</b><br>${esc(spot.access)}</div>`;
  if (spot.notes) html += `<div class="popup-section"><b>Notes</b><br>${esc(spot.notes)}</div>`;
  const rated = CRITERIA.filter(c => spot.ratings[c.key] > 0)
    .map(c => `${c.label} ${spot.ratings[c.key]}`).join(' · ');
  if (rated) html += `<div class="popup-section"><b>Ratings</b><br>${esc(rated)}</div>`;
  html += `<div class="popup-actions"><button class="small" onclick="openEditor('${spot.id}')">Edit</button></div>`;
  return html;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function renderMap() {
  spotLayerGroup.clearLayers();
  layersBySpot.clear();
  for (const spot of filteredSpots()) {
    const layer = buildLayer(spot);
    layersBySpot.set(spot.id, layer);
    spotLayerGroup.addLayer(layer);
  }
}

function flyToSpot(spot) {
  const layer = layersBySpot.get(spot.id);
  if (!layer) return;
  if (spot.geometry.type === 'marker') {
    map.flyTo(spot.geometry.coords[0], Math.max(map.getZoom(), 14), { duration: 0.6 });
  } else {
    map.flyToBounds(layer.getBounds().pad(0.4), { duration: 0.6, maxZoom: 15 });
  }
  setTimeout(() => layer.openPopup(), 650);
}

/* ================= Sidebar list ================= */

const listEl = document.getElementById('spot-list');
let activeSpotId = null;

function filteredSpots() {
  const q = document.getElementById('filter-search').value.trim().toLowerCase();
  const region = document.getElementById('filter-region').value;
  return spots.filter(s => {
    if (region && s.region !== region) return false;
    if (!q) return true;
    const hay = [s.name, s.detail, s.waterbody, s.season, s.access, s.notes, (s.species || []).join(' '), s.classified ? 'classified water' : '']
      .join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function sortedFilteredSpots() {
  const by = document.getElementById('sort-by').value;
  const arr = filteredSpots().slice();
  if (by === 'name') {
    arr.sort((a, b) => a.name.localeCompare(b.name));
  } else if (by === 'newest') {
    arr.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  } else if (by === 'overall') {
    arr.sort((a, b) => (overallScore(b) ?? -1) - (overallScore(a) ?? -1));
  } else {
    arr.sort((a, b) => (b.ratings[by] || 0) - (a.ratings[by] || 0));
  }
  return arr;
}

function renderList() {
  const arr = sortedFilteredSpots();
  listEl.innerHTML = '';
  if (!arr.length) {
    listEl.innerHTML = `<div class="empty-note">No spots yet.<br>Use <b>+ Pin</b>, <b>+ Stretch</b>, or <b>+ Area</b> above, then click the map to place your first spot.</div>`;
    return;
  }
  for (const spot of arr) {
    const score = overallScore(spot);
    const card = document.createElement('div');
    card.className = 'spot-card' + (spot.id === activeSpotId ? ' active' : '');
    const geomIcon = spot.geometry.type === 'marker' ? '📍' : spot.geometry.type === 'line' ? '〰️' : '⬠';
    card.innerHTML =
      `<div class="top"><div class="name">${escapeHtml(spot.name)}</div>` +
      `<div class="score-badge" style="background:${scoreColor(score)}">${fmtScore(score)}</div></div>` +
      (spot.detail ? `<div class="detail">${geomIcon} ${escapeHtml(spot.detail)}</div>` : '') +
      `<div class="chips"><span class="chip region">${escapeHtml(REGION_LABELS[spot.region] || spot.region)}</span>` +
      (spot.classified ? `<span class="chip classified">classified water</span>` : '') +
      (spot.species || []).map(sp => `<span class="chip">${escapeHtml(sp)}</span>`).join('') +
      `</div>`;
    card.addEventListener('click', () => { setActiveCard(spot.id); flyToSpot(spot); });
    listEl.appendChild(card);
  }
}

function setActiveCard(id) {
  activeSpotId = id;
  renderList();
}

function renderAll() {
  renderMap();
  renderList();
}

/* ================= Drawing ================= */

const drawBanner = document.getElementById('draw-banner');
const drawBannerText = document.getElementById('draw-banner-text');
let drawState = null; // { type, points, tempLayer, forSpotId }

const DRAW_HINTS = {
  marker: 'Click the map to place the pin.',
  line: 'Click along the stretch (river section, shoreline…). Double-click or press Finish when done.',
  area: 'Click around the zone. Double-click or press Finish when done (needs 3+ points).',
};

function startDraw(type, forSpotId = null) {
  cancelDraw();
  drawState = { type, points: [], tempLayer: null, forSpotId };
  drawBannerText.textContent = DRAW_HINTS[type];
  drawBanner.classList.add('visible');
  document.getElementById('draw-finish').style.display = type === 'marker' ? 'none' : '';
  map.getContainer().style.cursor = 'crosshair';
  closeEditorPanel(false);
}

function updateTempLayer() {
  if (drawState.tempLayer) map.removeLayer(drawState.tempLayer);
  const pts = drawState.points;
  if (!pts.length) { drawState.tempLayer = null; return; }
  if (drawState.type === 'line') {
    drawState.tempLayer = L.polyline(pts, { color: '#0e7490', weight: 4, dashArray: '6 6' });
  } else if (drawState.type === 'area') {
    drawState.tempLayer = pts.length >= 3
      ? L.polygon(pts, { color: '#0e7490', weight: 3, dashArray: '6 6', fillOpacity: 0.15 })
      : L.polyline(pts, { color: '#0e7490', weight: 4, dashArray: '6 6' });
  }
  if (drawState.tempLayer) drawState.tempLayer.addTo(map);
}

map.on('click', (e) => {
  if (!drawState) return;
  drawState.points.push([e.latlng.lat, e.latlng.lng]);
  if (drawState.type === 'marker') { finishDraw(); return; }
  updateTempLayer();
});

map.on('dblclick', () => { if (drawState) finishDraw(); });

function finishDraw() {
  if (!drawState) return;
  const { type, points, forSpotId } = drawState;
  const minPts = type === 'marker' ? 1 : type === 'line' ? 2 : 3;
  if (points.length < minPts) {
    drawBannerText.textContent = `Need at least ${minPts} point${minPts > 1 ? 's' : ''} — keep clicking, or Cancel.`;
    return;
  }
  const geometry = { type, coords: points };
  cancelDraw();
  if (forSpotId) {
    const spot = spots.find(s => s.id === forSpotId);
    if (spot) { spot.geometry = geometry; saveSpots(); renderAll(); }
    openEditor(forSpotId);
  } else {
    openEditor(null, geometry);
  }
}

function cancelDraw() {
  if (drawState && drawState.tempLayer) map.removeLayer(drawState.tempLayer);
  drawState = null;
  drawBanner.classList.remove('visible');
  map.getContainer().style.cursor = '';
}

document.getElementById('btn-add-pin').addEventListener('click', () => startDraw('marker'));
document.getElementById('btn-add-line').addEventListener('click', () => startDraw('line'));
document.getElementById('btn-add-area').addEventListener('click', () => startDraw('area'));
document.getElementById('draw-finish').addEventListener('click', finishDraw);
document.getElementById('draw-cancel').addEventListener('click', cancelDraw);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cancelDraw(); });

/* ================= Editor ================= */

const editorEl = document.getElementById('editor');
let editing = null; // { id: string|null, geometry }

const ratingRowsEl = document.getElementById('rating-rows');
let editRatings = {};

function renderRatingRows() {
  ratingRowsEl.innerHTML = '';
  for (const c of CRITERIA) {
    const row = document.createElement('div');
    row.className = 'rating-row';
    const stars = document.createElement('div');
    stars.className = 'stars';
    for (let i = 1; i <= 5; i++) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = '★';
      b.className = (editRatings[c.key] || 0) >= i ? 'on' : '';
      b.addEventListener('click', () => { editRatings[c.key] = i; renderRatingRows(); });
      stars.appendChild(b);
    }
    const clear = document.createElement('button');
    clear.type = 'button';
    clear.className = 'clear';
    clear.textContent = 'clear';
    clear.title = 'Remove this rating';
    clear.addEventListener('click', () => { editRatings[c.key] = 0; renderRatingRows(); });
    stars.appendChild(clear);
    const label = document.createElement('div');
    label.className = 'rname';
    label.textContent = c.label;
    row.appendChild(label);
    row.appendChild(stars);
    ratingRowsEl.appendChild(row);
  }
  const vals = CRITERIA.map(c => editRatings[c.key] || 0).filter(v => v > 0);
  const overall = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  document.getElementById('overall-preview').textContent = fmtScore(overall);
  document.getElementById('overall-note').textContent =
    vals.length && vals.length < CRITERIA.length ? `(average of ${vals.length} rated)` : '';
}

function geomSummary(g) {
  if (!g) return 'No geometry yet.';
  if (g.type === 'marker') return `Pin at ${g.coords[0][0].toFixed(4)}, ${g.coords[0][1].toFixed(4)}`;
  return `${g.type === 'line' ? 'Stretch' : 'Area'} with ${g.coords.length} points`;
}

function openEditor(spotId, newGeometry = null) {
  map.closePopup();
  const spot = spotId ? spots.find(s => s.id === spotId) : null;
  editing = {
    id: spotId,
    geometry: newGeometry || (spot ? spot.geometry : null),
  };
  document.getElementById('editor-title').textContent = spot ? 'Edit Spot' : 'New Spot';
  document.getElementById('f-name').value = spot ? spot.name : '';
  document.getElementById('f-detail').value = spot ? spot.detail : '';
  document.getElementById('f-water').value = spot ? spot.waterbody : '';
  document.getElementById('f-region').value = spot ? spot.region : guessRegion(editing.geometry);
  document.getElementById('f-classified').checked = spot ? !!spot.classified : false;
  document.getElementById('f-species').value = spot ? (spot.species || []).join(', ') : '';
  document.getElementById('f-season').value = spot ? spot.season : '';
  document.getElementById('f-access').value = spot ? spot.access : '';
  document.getElementById('f-notes').value = spot ? spot.notes : '';
  document.getElementById('btn-delete').style.display = spot ? '' : 'none';
  document.getElementById('geom-summary').textContent = geomSummary(editing.geometry);
  editRatings = spot ? { ...spot.ratings } : { fish: 0, action: 0, access: 0, scenery: 0 };
  renderRatingRows();
  editorEl.classList.add('visible');
  document.getElementById('f-name').focus();
}
window.openEditor = openEditor; // popup buttons use inline onclick

function guessRegion(geometry) {
  if (!geometry) return 'fairmont';
  const [lat, lng] = geometry.coords[0];
  // Rough split: BC side by latitude (south of ~49.95 → Cranbrook/Elk Valley), east of -115 → Calgary
  if (lng < -115) return lat < 49.95 ? 'south' : 'fairmont';
  if (lat > 50.3) return 'calgary';
  return lat < 49.95 ? 'south' : 'other';
}

function closeEditorPanel(clearState = true) {
  editorEl.classList.remove('visible');
  if (clearState) editing = null;
}

document.getElementById('editor-close').addEventListener('click', () => closeEditorPanel());
document.getElementById('btn-cancel-edit').addEventListener('click', () => closeEditorPanel());

document.getElementById('btn-redraw').addEventListener('click', () => {
  if (!editing) return;
  if (editing.id) {
    startDraw(editing.geometry ? editing.geometry.type : 'marker', editing.id);
  } else {
    // New unsaved spot: stash nothing, just restart drawing of the same type
    startDraw(editing.geometry ? editing.geometry.type : 'marker');
  }
});

document.getElementById('btn-save').addEventListener('click', () => {
  if (!editing) return;
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  if (!editing.geometry) { alert('This spot has no map location — use "Redraw geometry" first.'); return; }
  const data = {
    name,
    detail: document.getElementById('f-detail').value.trim(),
    waterbody: document.getElementById('f-water').value.trim(),
    region: document.getElementById('f-region').value,
    classified: document.getElementById('f-classified').checked,
    species: document.getElementById('f-species').value.split(',').map(s => s.trim()).filter(Boolean),
    season: document.getElementById('f-season').value.trim(),
    access: document.getElementById('f-access').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    ratings: { ...editRatings },
    geometry: editing.geometry,
  };
  if (editing.id) {
    const spot = spots.find(s => s.id === editing.id);
    Object.assign(spot, data, { updatedAt: Date.now() });
    activeSpotId = spot.id;
  } else {
    const spot = { id: 'spot-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7), createdAt: Date.now(), ...data };
    spots.push(spot);
    activeSpotId = spot.id;
  }
  saveSpots();
  closeEditorPanel();
  renderAll();
});

document.getElementById('btn-delete').addEventListener('click', () => {
  if (!editing || !editing.id) return;
  const spot = spots.find(s => s.id === editing.id);
  if (!confirm(`Delete "${spot.name}"? This can't be undone (unless you have an export).`)) return;
  spots = spots.filter(s => s.id !== editing.id);
  saveSpots();
  closeEditorPanel();
  renderAll();
});

/* ================= Filters / sort / jumps ================= */

for (const id of ['filter-search', 'filter-region', 'sort-by']) {
  document.getElementById(id).addEventListener('input', renderAll);
}

document.getElementById('jump-fairmont').addEventListener('click', () =>
  map.flyTo(REGION_VIEWS.fairmont.center, REGION_VIEWS.fairmont.zoom, { duration: 0.8 }));
document.getElementById('jump-south').addEventListener('click', () =>
  map.flyTo(REGION_VIEWS.south.center, REGION_VIEWS.south.zoom, { duration: 0.8 }));
document.getElementById('jump-calgary').addEventListener('click', () =>
  map.flyTo(REGION_VIEWS.calgary.center, REGION_VIEWS.calgary.zoom, { duration: 0.8 }));
document.getElementById('jump-all').addEventListener('click', () => {
  const layers = [...layersBySpot.values()];
  if (!layers.length) return;
  const group = L.featureGroup(layers);
  map.flyToBounds(group.getBounds().pad(0.2), { duration: 0.8 });
});

/* ================= Import / export ================= */

document.getElementById('btn-export').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), spots }, null, 2)],
    { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fishing-spots-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('btn-import').addEventListener('click', () =>
  document.getElementById('import-file').click());

document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const incoming = Array.isArray(parsed) ? parsed : parsed.spots;
      if (!Array.isArray(incoming)) throw new Error('No spots array found');
      const mode = confirm(`Import ${incoming.length} spots.\n\nOK = MERGE with your current ${spots.length} spots (updates matching ids)\nCancel = choose replace…`)
        ? 'merge'
        : (confirm('REPLACE all current spots with the imported file?') ? 'replace' : null);
      if (!mode) return;
      if (mode === 'replace') {
        spots = incoming;
      } else {
        const byId = new Map(spots.map(s => [s.id, s]));
        for (const s of incoming) byId.set(s.id, s);
        spots = [...byId.values()];
      }
      saveSpots();
      renderAll();
    } catch (err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
});

/* ================= Init ================= */

renderAll();
if (spots.length) {
  const group = L.featureGroup([...layersBySpot.values()]);
  if (group.getLayers().length) map.fitBounds(group.getBounds().pad(0.3));
}
</script>
